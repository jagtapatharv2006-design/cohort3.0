<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <main>
        <nav>
            <div class="right">
                <img src="logoscalex.png" alt="logo" width="auto" height="50px">
            </div>
            <div class="center">
                <p class="navtext">Home</p>
                <p class="navtext">About us</p>
                <p class="navtext">Blogs</p>
                <p class="navtext">Contact Us</p>
            </div>
            <div class="left">
                <button id="get-started"> Get started</button>
            </div>
        </nav>
        <div class="text">
            <p class="heading">Insights & Blogs</p>
        </div>
        <div class="buttonsection">
            <button id="active" class="button">All</button>
            <button class="button">Tech</button>
            <button class="button">SaaS</button>
            <button class="button">Marketing</button>
        </div>
        <div class="cardsection">
            <div class="card">
                 <img class="met" src="picture1.png" alt="Avatar" width="20%" height="20%">
                 <button class="section">Tech
                 </button>
                <div class="hea">The Ultimate Guide To SaaS Marketing</div>
                <div class="date">May 23,2025</div>
            </div>
            <div class="card">
                 <img class="met" src="picture2.png" alt="Avatar" width="20%" height="20%">
                 <button class="section">SaaS
                 </button>
                <div class="hea">5 Key Trends In SaaS Growth For 2025</div>
                <div class="date">May 23,2025</div>
            </div>
            <div class="card">
                 <img class="met" src="picture3.png" alt="Avatar" width="20%" height="20%">
                 <button class="section">Marketing
                 </button>
                <div class="hea">How Data-Driven Strategies Are Important</div>
                <div class="date">May 23,2025</div>
            </div>
        </div>
        
    </main>

    
    
</body>
</html>
